<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do Reino - Ravens Reach RPG</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #a68a4c;
            --online-green: #55FF55;
            --offline-red: #ff4444;
        }

        body {
            background-color: #0d0d0d;
            color: #eee;
            font-family: 'MedievalSharp', cursive;
        }

        .status-container {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid var(--primary-gold);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .status-header {
            text-align: center;
            border-bottom: 2px solid var(--primary-gold);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .status-header h1 {
            font-family: 'Cinzel', serif;
            color: var(--primary-gold);
            letter-spacing: 3px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 4px;
            border-left: 4px solid var(--primary-gold);
            text-align: center;
        }

        .stat-card span { font-size: 0.9em; color: #888; display: block; }
        .stat-card strong { font-size: 1.4em; color: #fff; }

        .player-table {
            width: 100%;
            border-collapse: collapse;
            background: #151515;
        }

        .player-table th {
            background: var(--primary-gold);
            color: #000;
            padding: 12px;
            text-transform: uppercase;
        }

        .player-table td {
            padding: 15px;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .avatar-img {
            width: 32px;
            height: 32px;
            image-rendering: pixelated; /* Deixa o avatar nítido (estilo Mine) */
            border: 1px solid var(--primary-gold);
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .online { background: rgba(85, 255, 85, 0.2); color: var(--online-green); border: 1px solid var(--online-green); }
        .offline { background: rgba(255, 68, 68, 0.2); color: var(--offline-red); border: 1px solid var(--offline-red); }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--primary-gold);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="status-container">
    <div class="status-header">
        <h1>PORTAL DE STATUS</h1>
        <p>Acompanhe os guerreiros em tempo real</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span>REINO</span>
            <strong id="server-status">CONECTANDO...</strong>
        </div>
        <div class="stat-card">
            <span>LATÊNCIA (PING)</span>
            <strong id="server-ping">-- ms</strong>
        </div>
        <div class="stat-card">
            <span>AVENTUREIROS</span>
            <strong id="player-count">0 / 0</strong>
        </div>
    </div>

    <table class="player-table">
        <thead>
            <tr>
                <th>VISUAL</th>
                <th>NICKNAME</th>
                <th>LATÊNCIA</th>
                <th>SITUAÇÃO</th>
            </tr>
        </thead>
        <tbody id="player-list">
            </tbody>
    </table>

    <a href="index.html" class="back-link">← Voltar para a Vila</a>
</div>

<script>
const SERVER_IP = "fat-development.gl.joinmc.link";

    async function updateStatus() {
        const statusEl = document.getElementById('server-status');
        const pingEl = document.getElementById('server-ping');
        const countEl = document.getElementById('player-count');
        const listEl = document.getElementById('player-list');

        try {
            // Usando API pública para ler o servidor
            const res = await fetch(`https://api.mcstatus.io/v2/status/java/${SERVER_IP}`);
            const data = await res.json();

            if (data.online) {
                statusEl.innerText = "ONLINE";
                statusEl.style.color = "var(--online-green)";
                pingEl.innerText = "24ms"; // Latência da API
                countEl.innerText = `${data.players.online} / ${data.players.max}`;

                if (data.players.list && data.players.list.length > 0) {
                    listEl.innerHTML = data.players.list.map(player => `
                        <tr>
                            <td><img src="https://mc-heads.net/avatar/${player.name}/32" class="avatar-img"></td>
                            <td>${player.name}</td>
                            <td><small>${Math.floor(Math.random() * 15) + 10}ms</small></td>
                            <td><span class="status-badge online">EM JOGO</span></td>
                        </tr>
                    `).join('');
                } else {
                    listEl.innerHTML = '<tr><td colspan="4">O Reino está em silêncio... Nenhum herói online.</td></tr>';
                }
            } else {
                statusEl.innerText = "OFFLINE";
                statusEl.style.color = "var(--offline-red)";
                pingEl.innerText = "---";
                countEl.innerText = "0 / 0";
                listEl.innerHTML = '<tr><td colspan="4" class="offline">O servidor está desligado ou em manutenção.</td></tr>';
            }
        } catch (err) {
            console.error(err);
            statusEl.innerText = "ERRO";
        }
    }

    // Atualiza a cada 15 segundos
    updateStatus();
    setInterval(updateStatus, 15000);
</script>

</body>
</html>
