<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Jogador - Ravens Reach</title>

    <link rel="stylesheet" href="style.css">

    <style>
        :root {
            --primary: #a68a4c;
            --primary-dark: #8a6f3a;
            --bg-dark: #0a0a0a;
            --card-bg: #121212;
            --danger: #ff4444;
            --text-muted: #888;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            /* Mude de center para flex-start */
            align-items: flex-start;
            min-height: 110vh;
            /* Aumente o padding superior */
            padding: 60px 20px 20px 20px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            background: rgba(166, 138, 76, 0.1);
            color: var(--primary);
            padding: 10px 20px;
            /* Aumentei um pouco o preenchimento */
            border: 1px solid var(--primary);
            border-radius: 4px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 30px;
            /* Mais espaço abaixo dele */
            transition: 0.3s;
            box-sizing: border-box;
            /* Garante que o padding não aumente o tamanho real */
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-top: 4px solid var(--primary);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Novo estilo para o botão de voltar dentro do card */
        .btn-back {
            display: inline-flex;
            align-items: center;
            background: rgba(166, 138, 76, 0.1);
            color: var(--primary);
            padding: 8px 15px;
            border: 1px solid var(--primary);
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: var(--primary);
            color: #000;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 30px;
            margin-bottom: 30px;
        }

        .avatar-section {
            position: relative;
        }

        #user-avatar {
            width: 120px;
            height: 120px;
            border: 2px solid var(--primary);
            border-radius: 12px;
            object-fit: cover;
            background: #000;
        }

        .btn-photo {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: var(--primary);
            color: #000;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .user-info-text h2 {
            margin: 0;
            font-size: 28px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        input {
            background: #000;
            border: 1px solid #333;
            padding: 12px 15px;
            color: #fff;
            border-radius: 4px;
            font-size: 14px;
        }

        input:focus {
            border-color: var(--primary);
            background: #050505;
            outline: none;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            background: #1a1a1a;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 0 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }

        .btn-action:hover {
            background: var(--primary);
            color: #000;
        }

        .btn-save {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 4px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 20px;
        }

        .danger-zone {
            margin-top: 50px;
            padding: 20px;
            border: 2px dashed #ff4444;
            background: rgba(255, 0, 0, 0.1);
            text-align: center;
            border-radius: 8px;
        }

        .btn-delete {
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <br>
    <div class="container">
        <div class="profile-card">

            <a href="index.html" class="btn-back">← VOLTAR AO PAINEL</a>

            <div class="profile-header">
                <div class="avatar-section">
                    <img src="assets/default_steve.png" id="user-avatar" alt="Avatar">
                    <input type="file" id="file-input" style="display: none;" accept="image/*">
                    <button class="btn-photo" onclick="document.getElementById('file-input').click()">+</button>
                </div>
                <div class="user-info-text">
                    <h2 id="username-display">CARREGANDO...</h2>
                    <p style="color: var(--text-muted); margin: 5px 0 0 0; font-size: 14px;">Membro da Guilda Ravens
                        Reach</p>
                </div>
            </div>

            <form id="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Apelido no Site</label>
                        <input type="text" id="nickname" placeholder="Ex: Mestre das Sombras">
                    </div>

                    <div class="form-group">
                        <label>E-mail Principal</label>
                        <div class="input-group">
                            <input type="email" id="email" placeholder="seu@email.com" style="flex: 1;">
                            <button type="button" class="btn-action">VERIFICAR</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Telefone / WhatsApp</label>
                        <div class="input-group">
                            <input type="text" id="phone" placeholder="(00) 00000-0000" style="flex: 1;">
                            <button type="button" class="btn-action">SMS</button>
                        </div>
                    </div>

                    <button type="submit" class="btn-save full-width">SALVAR ALTERAÇÕES DO PERFIL</button>
                </div>
            </form>

            <div class="danger-zone">
                <h3>ZONA DE PERIGO</h3>
                <p>Para apagar sua conta permanentemente, confirme sua senha:</p>
                <input type="password" id="senhaConfirmacao" placeholder="Sua senha atual"
                    style="padding: 10px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff; width: 80%; max-width: 300px;">
                <br>
                <button onclick="solicitarExclusao()" class="btn-delete">APAGAR CONTA PARA SEMPRE</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
