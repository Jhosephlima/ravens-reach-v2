<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Jogador - Ravens Reach</title>

    <link rel="stylesheet" href="style.css">

    <style>
        :root {
            --primary: #a68a4c;
            --primary-dark: #8a6f3a;
            --bg-dark: #0a0a0a;
            --card-bg: #121212;
            --danger: #ff4444;
            --text-muted: #888;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            /* Ajustado para mobile */
            padding: 40px 15px; 
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-top: 4px solid var(--primary);
            padding: 30px; /* Reduzi um pouco para ganhar espaço */
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            background: rgba(166, 138, 76, 0.1);
            color: var(--primary);
            padding: 8px 15px;
            border: 1px solid var(--primary);
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: var(--primary);
            color: #000;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 25px;
            border-bottom: 1px solid #222;
            padding-bottom: 30px;
            margin-bottom: 30px;
        }

        #user-avatar {
            width: 100px; /* Reduzi um pouco para mobile */
            height: 100px;
            border: 2px solid var(--primary);
            border-radius: 12px;
            object-fit: cover;
            background: #000;
        }

        .avatar-section { position: relative; }

        .btn-photo {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--primary);
            color: #000;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .user-info-text h2 {
            margin: 0;
            font-size: 24px;
            color: var(--primary);
            text-transform: uppercase;
        }

        /* GRID RESPONSIVO */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* PC: 2 Colunas */
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width { grid-column: span 2; }

        label {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        input {
            background: #000;
            border: 1px solid #333;
            padding: 12px;
            color: #fff;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            background: #1a1a1a;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 0 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 10px;
            white-space: nowrap;
        }

        .btn-save {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 4px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .danger-zone {
            margin-top: 40px;
            padding: 20px;
            border: 1px dashed #ff4444;
            background: rgba(255, 0, 0, 0.05);
            text-align: center;
            border-radius: 8px;
        }

        .btn-delete {
            background: #ff4444;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 10px;
            width: 100%;
        }

        /* --- MEDIA QUERY PARA CELULAR --- */
        @media (max-width: 600px) {
            body { padding: 20px 10px; }

            .profile-card { padding: 20px; }

            .profile-header {
                flex-direction: column; /* Avatar em cima do nome */
                text-align: center;
                gap: 15px;
            }

            .form-grid {
                grid-template-columns: 1fr; /* Tudo vira uma coluna só */
            }

            .full-width { grid-column: span 1; }

            .user-info-text h2 { font-size: 20px; }

            .input-group {
                flex-direction: column; /* Input e Botão um em cima do outro */
            }

            .btn-action {
                padding: 10px;
                width: 100%;
            }

            #senhaConfirmacao {
                width: 100% !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="profile-card">
            <a href="index.html" class="btn-back">← VOLTAR AO PAINEL</a>

            <div class="profile-header">
                <div class="avatar-section">
                    <img src="assets/default_steve.png" id="user-avatar" alt="Avatar">
                    <input type="file" id="file-input" style="display: none;" accept="image/*">
                    <button class="btn-photo" onclick="document.getElementById('file-input').click()">+</button>
                </div>
                <div class="user-info-text">
                    <h2 id="username-display">CARREGANDO...</h2>
                    <p style="color: var(--text-muted); margin: 5px 0 0 0; font-size: 13px;">Membro da Guilda Ravens Reach</p>
                </div>
            </div>

            <form id="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Apelido no Site</label>
                        <input type="text" id="nickname" placeholder="Ex: Mestre das Sombras">
                    </div>

                    <div class="form-group">
                        <label>E-mail Principal</label>
                        <div class="input-group">
                            <input type="email" id="email" placeholder="seu@email.com">
                            <button type="button" class="btn-action">VERIFICAR</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Telefone / WhatsApp</label>
                        <div class="input-group">
                            <input type="text" id="phone" placeholder="(00) 00000-0000">
                            <button type="button" class="btn-action">SMS</button>
                        </div>
                    </div>

                    <div class="btn-group full-width">
                        <button type="submit" class="btn-save">SALVAR ALTERAÇÕES</button>
                    </div>
                </div>
            </form>

            <div class="danger-zone">
                <h3 style="color: var(--danger); font-size: 14px;">ZONA DE PERIGO</h3>
                <p style="font-size: 12px; color: var(--text-muted);">Confirme sua senha para excluir a conta:</p>
                <input type="password" id="senhaConfirmacao" placeholder="Sua senha atual"
                    style="margin-bottom: 10px; background: #222; text-align: center;">
                <button onclick="solicitarExclusao()" class="btn-delete">APAGAR CONTA PERMANENTEMENTE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
